name: 功能建议
description: 提交新功能、改进建议或体验优化想法
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      description: 先描述现有问题或使用痛点
      placeholder: 例如：批量发送完成后，希望能够输出更清晰的汇总信息
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议的方案
      description: 请尽量描述你期望的功能或行为
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 其他可选方案
      description: 如果你考虑过其他实现方式，也可以补充
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: 其他补充信息
      description: 可以附示例代码、截图、日志或相关使用场景
    validations:
      required: false
